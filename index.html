<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Get a Grip — The Cave</title>
<style>
  :root{--bg:#090b0e;--panel:#15181d;--panel2:#1c2027;--line:#2a2f38;--ink:#f2f4f7;--muted:#8b93a1;--accent:#ffd21e;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:var(--font);overflow:hidden}
  #app{position:fixed;inset:0} canvas{display:block}
  #ui{position:absolute;top:0;left:0;height:100%;width:318px;
    background:linear-gradient(180deg,rgba(21,24,29,.93),rgba(9,11,14,.93));
    border-right:1px solid var(--line);display:flex;flex-direction:column;backdrop-filter:blur(8px);z-index:10}
  .brand{padding:20px 20px 14px;border-bottom:1px solid var(--line)}
  .brand h1{margin:0;font-size:19px;letter-spacing:.02em;font-weight:800;display:flex;align-items:center;gap:9px}
  .brand h1 .dot{width:11px;height:11px;border-radius:3px;background:var(--accent);box-shadow:0 0 12px var(--accent)}
  .brand p{margin:5px 0 0;font-size:12px;color:var(--muted)}
  .sect{padding:12px 18px 2px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .list{flex:1;overflow-y:auto;padding:2px 12px 20px}
  .list::-webkit-scrollbar{width:8px}.list::-webkit-scrollbar-thumb{background:#2a2f38;border-radius:4px}
  .route{display:flex;align-items:center;gap:12px;padding:11px 12px;margin:6px 0;border-radius:10px;
    background:var(--panel2);border:1px solid var(--line);cursor:pointer;transition:.15s}
  .route:hover{border-color:#3a414c;transform:translateX(2px)}
  .route.active{border-color:var(--accent);background:#20242c;box-shadow:0 0 0 1px var(--accent) inset}
  .route .swatch{width:16px;height:16px;border-radius:5px;flex:0 0 auto;box-shadow:0 0 0 2px rgba(255,255,255,.08)}
  .route .meta{flex:1;min-width:0}
  .route .meta .nm{font-size:14px;font-weight:600;line-height:1.2}
  .route .meta .sub{font-size:11.5px;color:var(--muted);margin-top:2px}
  .route .grade{font-size:12px;font-weight:800;padding:3px 8px;border-radius:6px;background:#090b0e;color:var(--accent)}
  .hint{padding:12px 20px;border-top:1px solid var(--line);font-size:11.5px;color:var(--muted);line-height:1.5}
  #topbar{position:absolute;top:14px;right:14px;display:flex;gap:8px;z-index:10}
  #topbar button{padding:9px 14px;font-size:12.5px;font-weight:600;color:var(--ink);
    background:rgba(28,32,39,.9);border:1px solid var(--line);border-radius:9px;cursor:pointer;transition:.15s;
    display:flex;align-items:center;gap:7px;backdrop-filter:blur(6px)}
  #topbar button:hover{border-color:#3a414c;background:rgba(38,43,52,.9)}
  #topbar button.on{border-color:var(--accent);color:var(--accent)}
  #topbar button svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.7}
  #detail{position:absolute;bottom:16px;right:16px;width:288px;padding:16px 18px;z-index:10;
    background:rgba(21,24,29,.96);border:1px solid var(--line);border-radius:14px;backdrop-filter:blur(8px);
    transform:translateY(150%);transition:transform .28s cubic-bezier(.2,.8,.2,1)}
  #detail.show{transform:translateY(0)}
  #detail .dh{display:flex;align-items:center;gap:10px}
  #detail .dh .swatch{width:18px;height:18px;border-radius:6px}
  #detail .dh .nm{font-size:16px;font-weight:700;flex:1}
  #detail .dh .grade{font-size:13px;font-weight:800;color:var(--accent)}
  #detail .drow{display:flex;gap:18px;margin-top:12px}
  #detail .drow div .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  #detail .drow div .v{font-size:15px;font-weight:600;margin-top:2px}
  #detail .setter{font-size:12px;color:var(--muted);margin-top:12px;line-height:1.5}
  #loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:var(--bg);z-index:50;color:var(--muted);font-size:14px}
  @media(max-width:720px){#ui{width:100%;height:auto;max-height:42%;bottom:0;top:auto;border-right:none;border-top:1px solid var(--line)}#detail{display:none}}
</style>
</head>
<body>
<div id="app"></div>
<div id="loading">Building the cave…</div>

<div id="ui">
  <div class="brand"><h1><span class="dot"></span>GET A GRIP</h1><p>The Cave · routes by colour</p></div>
  <div class="sect">Routes</div>
  <div class="list" id="list"></div>
  <div class="hint">Each colour is a route. Drag to orbit the whole bay · scroll to zoom · click a route or hold to isolate it.</div>
</div>

<div id="topbar">
  <button id="btnReset"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v4h4"/></svg>Reset</button>
  <button id="btnAll"><svg viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>Overview</button>
</div>

<div id="detail">
  <div class="dh"><span class="swatch"></span><span class="nm"></span><span class="grade"></span></div>
  <div class="drow">
    <div><div class="k">Level</div><div class="v" data-level></div></div>
    <div><div class="k">Holds</div><div class="v" data-holds></div></div>
    <div><div class="k">Style</div><div class="v" data-style></div></div>
  </div>
  <div class="setter" data-desc></div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
const R=THREE, PI=Math.PI, rnd=(a,b)=>a+Math.random()*(b-a);

/* =========================================================================
   GET A GRIP — "The Cave"
   The whole overhanging bay, MODELLED (not photographed): a continuous
   curved overhanging surface (left triangular section → centre bulge →
   right yellow-fan prow → steep return), real protruding volumes + holds,
   PBR materials, image-based lighting, soft shadows.  Route = hold colour.
   Wall parametrised by (u across 0..1, v up 0..1).
   ========================================================================= */
const scene=new R.Scene(); scene.background=new R.Color(0x090b0e);
scene.fog=new R.Fog(0x090b0e,20,55);
const renderer=new R.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true; renderer.shadowMap.type=R.PCFSoftShadowMap;
renderer.toneMapping=R.ACESFilmicToneMapping; renderer.toneMappingExposure=1.18;
document.getElementById('app').appendChild(renderer.domElement);

// image-based lighting for realistic PBR
const pmrem=new R.PMREMGenerator(renderer);
scene.environment=pmrem.fromScene(new RoomEnvironment(),0.04).texture;

const camera=new R.PerspectiveCamera(50,innerWidth/innerHeight,0.1,300);
const HOME={pos:new R.Vector3(0.8,2.4,14.5),tgt:new R.Vector3(-0.4,3.4,2.2)};
camera.position.copy(HOME.pos);
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=.08; controls.target.copy(HOME.tgt);
controls.minDistance=6; controls.maxDistance=30; controls.maxPolarAngle=PI*0.54;

/* ---------- lighting (matches the gym: warm spots, magenta rim, blue sky) ---------- */
scene.add(new R.HemisphereLight(0x54637a,0x14161a,.75));
scene.add(new R.AmbientLight(0x44505f,.35));
const key=new R.SpotLight(0xfff1d2,220,40,PI/4.2,.5,1.3);
key.position.set(-6,10,12); key.target.position.set(-2,3,1);
key.castShadow=true; key.shadow.mapSize.set(2048,2048); key.shadow.camera.far=40; key.shadow.bias=-0.0002;
scene.add(key,key.target);
const key2=new R.SpotLight(0xffe9c4,150,42,PI/4.5,.55,1.4);
key2.position.set(6,10,12); key2.target.position.set(3,3,1);
key2.castShadow=true; key2.shadow.mapSize.set(1024,1024); key2.shadow.bias=-0.0003; scene.add(key2,key2.target);
const rim=new R.SpotLight(0xff3aae,26,50,PI/3,.7,1.5); rim.position.set(4,11,-6); scene.add(rim); // magenta ceiling accent
const skyF=new R.DirectionalLight(0x8fa6cc,.7); skyF.position.set(6,4,12); scene.add(skyF);     // cool blue fill from front
// front + low fills to light the OVERHANGING face (which points down-and-out)
const faceFill=new R.PointLight(0xcfe0f0,120,44,2); faceFill.position.set(-2,2.2,10); scene.add(faceFill);
const faceFill2=new R.PointLight(0xffe9cf,120,44,2); faceFill2.position.set(3,2.0,10); scene.add(faceFill2);
const upFill=new R.DirectionalLight(0xbcccdd,.55); upFill.position.set(0,-1,8); upFill.target.position.set(0,4,0); scene.add(upFill,upFill.target);

/* =========================================================================
   PARAMETRIC OVERHANGING WALL
   plan curve in XZ (viewer at +Z); top leans out toward viewer = overhang.
   ========================================================================= */
const HGT=4.9;
const planPts=[
  [-9.6,-2.2],[-6.6,-0.2],[-3.3,0.9],[-0.8,1.7],[1.3,1.75],[3.7,0.95],[6.3,-0.9],[8.2,-3.1]
].map(([x,z])=>new R.Vector3(x,0,z));
const curve=new R.CatmullRomCurve3(planPts,false,'catmullrom',0.5);
// overhang amount along u (top pushes toward viewer)
function overhang(u){
  const k=[[0,.5],[.22,1.6],[.42,1.0],[.55,.7],[.72,1.05],[1,.35]];
  for(let i=0;i<k.length-1;i++){if(u<=k[i+1][0]){const t=(u-k[i][0])/(k[i+1][0]-k[i][0]);return k[i][1]+(k[i+1][1]-k[i][1])*t;}}
  return .35;
}
const _p=new R.Vector3(),_t=new R.Vector3();
function surf(u,v,out=new R.Vector3()){
  curve.getPointAt(Math.min(Math.max(u,0),1),_p);
  curve.getTangentAt(Math.min(Math.max(u,0),1),_t);
  const nx=-_t.z, nz=_t.x;               // horizontal normal toward +Z (viewer)
  const y=v*HGT, lean=overhang(u)*v*v;   // overhang grows with height
  return out.set(_p.x+nx*lean, y, _p.z+nz*lean);
}
const _a=new R.Vector3(),_b=new R.Vector3(),_c=new R.Vector3(),_du=new R.Vector3(),_dv=new R.Vector3();
function normalAt(u,v,out=new R.Vector3()){
  const e=0.004; surf(u,v,_a); surf(Math.min(u+e,1),v,_b); surf(u,Math.min(v+e,1),_c);
  _du.subVectors(_b,_a); _dv.subVectors(_c,_a); out.crossVectors(_dv,_du).normalize();
  if(out.z<0) out.multiplyScalar(-1); return out;
}
// build wall mesh
const NU=200, NV=54;
const wg=new R.BufferGeometry();
const vp=[],vn=[],vuv=[],idx=[];
for(let j=0;j<=NV;j++)for(let i=0;i<=NU;i++){
  const u=i/NU, v=j/NV; const P=surf(u,v), N=normalAt(u,v);
  vp.push(P.x,P.y,P.z); vn.push(N.x,N.y,N.z); vuv.push(u*8,v*4);
}
for(let j=0;j<NV;j++)for(let i=0;i<NU;i++){
  const a=j*(NU+1)+i,b=a+1,c=a+NU+1,d=c+1; idx.push(a,c,b, b,c,d);
}
wg.setAttribute('position',new R.Float32BufferAttribute(vp,3));
wg.setAttribute('normal',new R.Float32BufferAttribute(vn,3));
wg.setAttribute('uv',new R.Float32BufferAttribute(vuv,2));
wg.setIndex(idx);

// dark plywood + chalk texture (colour + bump)
function wallTex(){
  const c=document.createElement('canvas');c.width=c.height=1024;const x=c.getContext('2d');
  x.fillStyle='#101216';x.fillRect(0,0,1024,1024);
  for(let i=0;i<50;i++){x.globalAlpha=rnd(.02,.05);x.strokeStyle='#1b1f26';x.lineWidth=rnd(1,3);
    x.beginPath();let y=rnd(0,1024);x.moveTo(0,y);for(let px=0;px<1024;px+=40)x.lineTo(px,y+rnd(-6,6));x.stroke();}
  for(let i=0;i<520;i++){x.globalAlpha=rnd(.015,.07);x.fillStyle='#e6e9ee';x.beginPath();x.arc(rnd(0,1024),rnd(0,1024),rnd(5,42),0,7);x.fill();}
  x.globalAlpha=1;x.fillStyle='#050609';
  for(let gy=40;gy<1024;gy+=60)for(let gx=36;gx<1024;gx+=60){x.beginPath();x.arc(gx+((gy/60|0)%2)*30,gy,3.5,0,7);x.fill();}
  const t=new R.CanvasTexture(c);t.colorSpace=R.SRGBColorSpace;t.wrapS=t.wrapT=R.RepeatWrapping;t.anisotropy=8;return t;
}
const wt=wallTex();
const wallMat=new R.MeshStandardMaterial({map:wt,bumpMap:wt,bumpScale:0.02,color:0x40454f,roughness:.85,metalness:.02,
  envMapIntensity:1.15,side:R.DoubleSide,emissive:0x0c0e12,emissiveIntensity:1});
const wall=new R.Mesh(wg,wallMat); wall.castShadow=false; wall.receiveShadow=true; scene.add(wall);

/* floor mat */
const mat=new R.Mesh(new R.CircleGeometry(8,60),new R.MeshStandardMaterial({color:0x33302a,roughness:.99,envMapIntensity:.2}));
mat.rotation.x=-PI/2; mat.position.set(0,0.02,3); mat.receiveShadow=true; scene.add(mat);

/* =========================================================================
   VOLUMES + HOLDS
   ========================================================================= */
const COL={yellow:0xf2c40c,green:0x5bc740,blue:0x3f7ec4,grey:0x8f887a,purple:0x7a4ea0,pink:0xcf6a8a,tan:0xbcae8f,dark:0x24262c};
const _q=new R.Quaternion(),_up=new R.Vector3(0,1,0),_n=new R.Vector3();
function orient(mesh,u,v,along){ // set +Z(local) to surface normal
  normalAt(u,v,_n); _q.setFromUnitVectors(new R.Vector3(0,0,1),_n); mesh.quaternion.copy(_q);
  if(along) mesh.rotateZ(along);
}
const allHolds=[], byId={}; let HID=0;

function jitter(g,a){const p=g.attributes.position;for(let i=0;i<p.count;i++)p.setXYZ(i,p.getX(i)*(1+rnd(-a,a)),p.getY(i)*(1+rnd(-a,a)),p.getZ(i)*(1+rnd(-a,a)));g.computeVertexNormals();return g;}
const HG={};
function holdGeo(k){ if(HG[k])return HG[k]; let g;
  switch(k){
    case 'jug':    g=jitter(new R.SphereGeometry(1,20,16),.13);g.scale(1,.6,.5);break;
    case 'sloper': g=jitter(new R.SphereGeometry(1,22,16,0,PI*2,0,PI/2),.08);g.scale(1,.55,1);break;
    case 'crimp':  g=jitter(new R.SphereGeometry(1,16,12),.07);g.scale(1,.3,.45);break;
    case 'pinch':  g=jitter(new R.SphereGeometry(1,16,14),.15);g.scale(.62,.8,.5);break;
    case 'foot':   g=jitter(new R.IcosahedronGeometry(1,0),.14);g.scale(.75,.62,.5);break;
    default:       g=new R.SphereGeometry(1,12,10);
  } HG[k]=g; return g; }

function mkNode(mesh,cn){ mesh.castShadow=true; mesh.receiveShadow=true; scene.add(mesh);
  mesh.userData={id:++HID,baseColor:COL[cn],colorName:cn,mat:mesh.material,emissiveBase:mesh.material.emissive.getHex()};
  allHolds.push(mesh); byId[mesh.userData.id]=mesh; return mesh.userData.id; }

// small/medium hold
function hold(u,v,cn,{s=.16,k='jug',along=0}={}){
  const m=new R.Mesh(holdGeo(k),new R.MeshStandardMaterial({color:COL[cn],roughness:.5,metalness:.02,envMapIntensity:.7,
    emissive:new R.Color(COL[cn]),emissiveIntensity:0}));
  m.scale.setScalar(s); surf(u,v,m.position); orient(m,u,v,along);
  normalAt(u,v,_n); m.position.addScaledVector(_n, s*0.35); return mkNode(m,cn);
}
// quarter-pie yellow volume
function pie(u,v,cn,{radius=.5,along=0}={}){
  const g=new R.CylinderGeometry(radius*0.72,radius,radius*0.55,26,1,false,0,PI/2); g.rotateX(PI/2);
  const m=new R.Mesh(g,new R.MeshStandardMaterial({color:COL[cn],roughness:.4,metalness:.02,envMapIntensity:.6,
    emissive:new R.Color(COL[cn]),emissiveIntensity:0}));
  surf(u,v,m.position); orient(m,u,v,along); normalAt(u,v,_n); m.position.addScaledVector(_n,radius*0.15); return mkNode(m,cn);
}
function splitDome(u,v,cn,{radius=.55,along=0}={}){ pie(u,v,cn,{radius,along}); pie(u,v,cn,{radius,along:along+PI/2+0.05}); }
// triangular pyramid volume (the dark ones on the left)
function pyramid(u,v,cn,{size=.5,along=0}={}){
  const g=new R.ConeGeometry(size,size*1.5,3); g.rotateX(PI/2);
  const m=new R.Mesh(g,new R.MeshStandardMaterial({color:COL[cn],roughness:.55,metalness:.03,envMapIntensity:.5,
    emissive:new R.Color(COL[cn]),emissiveIntensity:0}));
  surf(u,v,m.position); orient(m,u,v,along); normalAt(u,v,_n); m.position.addScaledVector(_n,size*0.35); return mkNode(m,cn);
}

/* ---------- PLACEMENT across the whole bay (u:0 left → 1 right, v:0 floor →1 top) ---------- */
// LEFT section: dark triangular pyramids + yellow quarter stack + purple/pink + green (video v52_01-05, photo #1 left)
pyramid(.20,.60,'dark',{size:.5,along:.3}); pyramid(.25,.42,'dark',{size:.42,along:-.4});
pyramid(.29,.70,'dark',{size:.46,along:.6}); pyramid(.31,.30,'dark',{size:.4,along:.1});
pie(.075,.72,'yellow',{radius:.5,along:2.2}); pie(.06,.46,'yellow',{radius:.55,along:.4}); pie(.05,.20,'yellow',{radius:.55,along:-.6});
hold(.11,.60,'pink',{s:.2,k:'pinch',along:.5}); hold(.12,.40,'pink',{s:.15,k:'sloper'});
hold(.10,.30,'purple',{s:.16,k:'jug'}); hold(.15,.18,'purple',{s:.14,k:'foot'});
hold(.17,.50,'green',{s:.17,k:'sloper'}); hold(.20,.34,'green',{s:.14,k:'foot'}); hold(.14,.70,'green',{s:.15,k:'jug'});
hold(.24,.55,'blue',{s:.15,k:'sloper'}); hold(.27,.40,'blue',{s:.14,k:'pinch'});
hold(.22,.22,'green',{s:.13,k:'foot'}); hold(.19,.12,'green',{s:.13,k:'foot'});

// CENTRE bulge: yellow half-domes + green wrapping + blue/grey (video v52_06-12)
splitDome(.46,.60,'yellow',{radius:.72,along:.2}); pie(.42,.40,'yellow',{radius:.5,along:2.5});
splitDome(.50,.30,'yellow',{radius:.5,along:1.6});
hold(.38,.70,'green',{s:.18,k:'sloper'}); hold(.40,.52,'green',{s:.16,k:'jug'}); hold(.36,.40,'green',{s:.15,k:'sloper'});
hold(.44,.74,'green',{s:.15,k:'foot'}); hold(.48,.48,'green',{s:.16,k:'jug'});
hold(.52,.66,'blue',{s:.16,k:'sloper'}); hold(.54,.50,'blue',{s:.15,k:'pinch'}); hold(.50,.44,'blue',{s:.14,k:'jug'});
hold(.42,.24,'green',{s:.15,k:'foot'}); hold(.46,.16,'green',{s:.14,k:'foot'});
hold(.56,.36,'grey',{s:.16,k:'sloper'}); hold(.58,.58,'grey',{s:.15,k:'sloper'});
hold(.53,.80,'blue',{s:.14,k:'sloper'});

// RIGHT prow: yellow fans + green cluster + blue diagonal + grey (photo #2 / video v55)
splitDome(.66,.60,'yellow',{radius:.7,along:-.4}); splitDome(.63,.36,'yellow',{radius:.6,along:.2});
pie(.72,.72,'yellow',{radius:.5,along:-1.2}); pie(.70,.20,'yellow',{radius:.5,along:.9}); splitDome(.78,.46,'yellow',{radius:.62,along:-.5});
pie(.83,.12,'yellow',{radius:.45,along:2.0}); pie(.88,.80,'yellow',{radius:.5,along:-.3});
hold(.60,.70,'green',{s:.18,k:'sloper'}); hold(.62,.54,'green',{s:.16,k:'jug'}); hold(.59,.40,'green',{s:.16,k:'sloper'});
hold(.64,.30,'green',{s:.15,k:'crimp'}); hold(.61,.22,'green',{s:.16,k:'sloper'}); hold(.67,.48,'green',{s:.14,k:'foot'});
hold(.72,.50,'blue',{s:.16,k:'sloper'}); hold(.74,.40,'blue',{s:.15,k:'jug'}); hold(.76,.30,'blue',{s:.15,k:'sloper'});
hold(.78,.22,'blue',{s:.14,k:'pinch'}); hold(.70,.60,'blue',{s:.15,k:'sloper'});
hold(.75,.62,'grey',{s:.15,k:'jug'}); hold(.80,.58,'grey',{s:.15,k:'sloper'}); hold(.85,.44,'grey',{s:.14,k:'sloper'});
hold(.68,.14,'purple',{s:.14,k:'foot'}); hold(.82,.66,'yellow',{s:.13,k:'foot'});

// RIGHT return (steep dark, sparse)
hold(.92,.50,'blue',{s:.15,k:'jug'}); hold(.94,.62,'blue',{s:.14,k:'sloper'}); hold(.90,.36,'grey',{s:.14,k:'sloper'});

/* =========================================================================
   ROUTES = colour groups. Grade/level from the wall's number tags.
   ========================================================================= */
const META={
  yellow:{name:'Yellow Volumes',grade:'V5',level:3,style:'Overhang · volumes',desc:'Every yellow volume across the bay — the split quarter-pies and half-domes. Big, powerful, tags 3–5.'},
  green :{name:'Green',         grade:'V3',level:2,style:'Face · slopers',   desc:'Green holds wrapping the whole wall, left triangles to the right prow. The workhorse line.'},
  blue  :{name:'Blue',          grade:'V2',level:1,style:'Vertical · jugs',  desc:'Blue holds up the centre bulge and out the right diagonal. Friendly grade.'},
  grey  :{name:'Grey / Wood',   grade:'V4',level:2,style:'Open · slopers',   desc:'Grey and wooden holds through the middle and right — slopey and technical.'},
  purple:{name:'Purple',        grade:'V1',level:1,style:'Left · low',       desc:'Purple holds on the left overhang. Tag reads 2.'},
  pink  :{name:'Pink',          grade:'V2',level:1,style:'Left · pinches',   desc:'Pink pinches on the far-left overhang past the triangular volumes.'},
};
const ORDER=['yellow','green','blue','grey','purple','pink'];
const ROUTES=ORDER.filter(c=>allHolds.some(h=>h.userData.colorName===c)).map(c=>({
  id:c,color:COL[c],count:allHolds.filter(h=>h.userData.colorName===c).length,...META[c]}));
const byRoute=Object.fromEntries(ROUTES.map(r=>[r.id,r]));

/* =========================================================================
   INTERACTION
   ========================================================================= */
let active=null, overview=false;
function applyView(){
  const set=active?new Set(allHolds.filter(h=>h.userData.colorName===active).map(h=>h.userData.id)):null;
  allHolds.forEach(h=>{const u=h.userData;
    if(!set){u.mat.opacity=1;u.mat.transparent=false;u.mat.emissiveIntensity=overview?.25:0;u.mat.color.setHex(u.baseColor);}
    else if(set.has(u.id)){u.mat.opacity=1;u.mat.transparent=false;u.mat.emissiveIntensity=.55;u.mat.color.setHex(u.baseColor);}
    else{u.mat.transparent=true;u.mat.opacity=.09;u.mat.emissiveIntensity=0;u.mat.color.setHex(0x24272d);}});
}
function select(id){
  active=(active===id)?null:id; if(active)overview=false; applyView();
  document.querySelectorAll('.route').forEach(el=>el.classList.toggle('active',el.dataset.id===active));
  document.getElementById('btnAll').classList.toggle('on',overview);
  const d=document.getElementById('detail');
  if(active){const r=byRoute[active];d.classList.add('show');
    d.querySelector('.swatch').style.background='#'+r.color.toString(16).padStart(6,'0');
    d.querySelector('.nm').textContent=r.name; d.querySelector('.grade').textContent=r.grade;
    d.querySelector('[data-level]').textContent=['','Beginner','Intermediate','Advanced'][r.level];
    d.querySelector('[data-holds]').textContent=r.count;
    d.querySelector('[data-style]').textContent=r.style.split(' · ')[0];
    d.querySelector('[data-desc]').textContent=r.desc;
  } else d.classList.remove('show');
}
const ray=new R.Raycaster(),mouse=new R.Vector2(); let downXY=null;
renderer.domElement.addEventListener('pointerdown',e=>downXY=[e.clientX,e.clientY]);
renderer.domElement.addEventListener('pointerup',e=>{if(!downXY)return;
  if(Math.hypot(e.clientX-downXY[0],e.clientY-downXY[1])>6)return;
  mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;ray.setFromCamera(mouse,camera);
  const hit=ray.intersectObjects(allHolds,false)[0]; if(hit)select(hit.object.userData.colorName);});

/* sidebar */
const listEl=document.getElementById('list');
ROUTES.forEach(r=>{const el=document.createElement('div');el.className='route';el.dataset.id=r.id;
  el.innerHTML=`<span class="swatch" style="background:#${r.color.toString(16).padStart(6,'0')}"></span>
    <div class="meta"><div class="nm">${r.name}</div>
    <div class="sub">${['','Beginner','Intermediate','Advanced'][r.level]} · ${r.count} holds</div></div>
    <span class="grade">${r.grade}</span>`;
  el.onclick=()=>select(r.id); listEl.appendChild(el);});
document.getElementById('btnReset').onclick=()=>{tweenCam(HOME.pos);tweenTarget(HOME.tgt);};
document.getElementById('btnAll').onclick=e=>{active=null;overview=!overview;applyView();
  document.querySelectorAll('.route').forEach(el=>el.classList.remove('active'));
  document.getElementById('detail').classList.remove('show');
  e.currentTarget.classList.toggle('on',overview);};

/* tweens + loop */
let camTween=null,tgtTween=null;
function tweenCam(to){camTween={from:camera.position.clone(),to:to.clone(),t:0};}
function tweenTarget(to){tgtTween={from:controls.target.clone(),to:to.clone(),t:0};}
const ease=t=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
let last=performance.now();
function loop(now){const dt=Math.min((now-last)/1000,.05);last=now;
  if(camTween){camTween.t=Math.min(camTween.t+dt/1,1);camera.position.lerpVectors(camTween.from,camTween.to,ease(camTween.t));if(camTween.t>=1)camTween=null;}
  if(tgtTween){tgtTween.t=Math.min(tgtTween.t+dt/1,1);controls.target.lerpVectors(tgtTween.from,tgtTween.to,ease(tgtTween.t));if(tgtTween.t>=1)tgtTween=null;}
  controls.update();renderer.render(scene,camera);requestAnimationFrame(loop);}
applyView();requestAnimationFrame(loop);
document.getElementById('loading').style.display='none';
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
</body>
</html>
