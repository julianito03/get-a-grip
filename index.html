<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Get a Grip — 3D Wall</title>
<style>
  :root{--bg:#eceef1;--panel2:#f4f6f8;--line:#e0e3e8;--ink:#1c1f24;--muted:#6b7280;--accent:#f2b705;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:var(--font);overflow:hidden}
  #app{position:fixed;inset:0} canvas{display:block}
  #ui{position:absolute;top:0;left:0;height:100%;width:300px;background:rgba(255,255,255,.86);
    border-right:1px solid var(--line);display:flex;flex-direction:column;backdrop-filter:blur(10px);z-index:10}
  .brand{padding:20px 20px 15px;border-bottom:1px solid var(--line)}
  .brand h1{margin:0;font-size:19px;letter-spacing:.02em;font-weight:800;display:flex;align-items:center;gap:9px}
  .brand h1 .dot{width:11px;height:11px;border-radius:3px;background:var(--accent)}
  .brand p{margin:5px 0 0;font-size:12px;color:var(--muted)}
  .grp{padding:16px 18px 4px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .seg{display:flex;gap:6px;padding:4px 16px}
  .seg button{flex:1;padding:9px 0;font-size:12.5px;font-weight:600;color:var(--muted);background:var(--panel2);
    border:1px solid var(--line);border-radius:9px;cursor:pointer;transition:.15s}
  .seg button.on{color:#111;background:#fff;border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
  .row{display:flex;align-items:center;justify-content:space-between;padding:9px 18px;font-size:13px;color:var(--ink)}
  .row .v{color:var(--muted)}
  .spacer{flex:1}
  .hint{padding:12px 20px;border-top:1px solid var(--line);font-size:11.5px;color:var(--muted);line-height:1.5}
  #loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:50;color:var(--muted);font-size:14px}
  @media(max-width:720px){#ui{width:100%;height:auto;max-height:42%;bottom:0;top:auto;border-right:none;border-top:1px solid var(--line)}}
</style>
</head>
<body>
<div id="app"></div>
<div id="loading">Loading 3D wall…</div>
<div id="ui">
  <div class="brand"><h1><span class="dot"></span>GET A GRIP</h1><p>Prow wall · reconstructed 3D</p></div>
  <div class="grp">Render</div>
  <div class="seg" id="mode"><button data-m="clay" class="on">Clay</button><button data-m="tex">Textured</button></div>
  <div class="grp">View</div>
  <div class="seg" id="spin"><button data-s="1">Auto-rotate</button><button data-s="0" class="on">Manual</button></div>
  <div class="row">Wireframe <span><input type="checkbox" id="wire"></span></div>
  <div class="spacer"></div>
  <div class="hint">Solid mesh reconstructed from the wall photo. Drag to orbit · scroll to zoom. Clay shows pure geometry; Textured shows the surface.</div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
const R=THREE, PI=Math.PI;

const scene=new R.Scene(); scene.background=new R.Color(0xeceef1);
const renderer=new R.WebGLRenderer({antialias:true}); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight); renderer.shadowMap.enabled=true; renderer.shadowMap.type=R.PCFSoftShadowMap;
renderer.toneMapping=R.ACESFilmicToneMapping; renderer.toneMappingExposure=1.0; document.getElementById('app').appendChild(renderer.domElement);
const pmrem=new R.PMREMGenerator(renderer); scene.environment=pmrem.fromScene(new RoomEnvironment(),0.03).texture;

const camera=new R.PerspectiveCamera(42,innerWidth/innerHeight,0.01,1000);
const controls=new OrbitControls(camera,renderer.domElement); controls.enableDamping=true; controls.dampingFactor=.08;
controls.minDistance=0.3; controls.maxPolarAngle=PI*0.56;

scene.add(new R.HemisphereLight(0xffffff,0x9099a6,.9));
const key=new R.DirectionalLight(0xfff4e2,2.3); key.position.set(-4,9,7); key.castShadow=true;
key.shadow.mapSize.set(2048,2048); key.shadow.bias=-0.0003; key.shadow.normalBias=0.02;
key.shadow.camera.near=0.1; key.shadow.camera.far=60;
scene.add(key);
const fill=new R.DirectionalLight(0xeaf0ff,1.1); fill.position.set(5,3,9); scene.add(fill);
const rim=new R.DirectionalLight(0xfff0dd,.7); fill.position.set(9,5,3); scene.add(rim);

let ground;
const clayMat=new R.MeshStandardMaterial({color:0x9aa0a8,roughness:.72,metalness:.02,envMapIntensity:.6});
let HOME=null, model=null; const originals=new Map();

new GLTFLoader().load('meshy.glb',gl=>{
  model=gl.scene;
  model.traverse(o=>{ if(o.isMesh){ o.castShadow=true; o.receiveShadow=true; originals.set(o,o.material);
    if(o.material){o.material.roughness=Math.min(1,(o.material.roughness??.8));} } });
  // normalise scale/position: sit on ground, centre
  const box=new R.Box3().setFromObject(model); const c=box.getCenter(new R.Vector3()); const s=box.getSize(new R.Vector3());
  const scale=6/Math.max(s.x,s.y,s.z); model.scale.setScalar(scale);
  const box2=new R.Box3().setFromObject(model); const c2=box2.getCenter(new R.Vector3()); const min2=box2.min;
  model.position.sub(new R.Vector3(c2.x, min2.y, c2.z));
  scene.add(model);
  const b=new R.Box3().setFromObject(model); const ctr=b.getCenter(new R.Vector3()); const sz=b.getSize(new R.Vector3());
  const r=Math.max(sz.x,sz.y);
  ground=new R.Mesh(new R.PlaneGeometry(r*8,r*8),new R.MeshStandardMaterial({color:0xe4e7eb,roughness:.96}));
  ground.rotation.x=-PI/2; ground.position.y=0; ground.receiveShadow=true; scene.add(ground);
  key.target.position.copy(ctr); scene.add(key.target);
  HOME={pos:new R.Vector3(ctr.x+r*0.55, ctr.y+sz.y*0.15, ctr.z+r*1.35), tgt:ctr.clone()};
  camera.position.copy(HOME.pos); controls.target.copy(HOME.tgt);
  camera.near=r/200; camera.far=r*30; camera.updateProjectionMatrix();
  setMode('clay');
  document.getElementById('loading').style.display='none';
},undefined,e=>{document.getElementById('loading').textContent='Could not load model.';});

function setMode(m){
  if(!model)return;
  model.traverse(o=>{ if(o.isMesh){ o.material = (m==='clay')?clayMat:originals.get(o); if(o.material) o.material.wireframe=wireOn; } });
  document.querySelectorAll('#mode button').forEach(b=>b.classList.toggle('on',b.dataset.m===m));
}
let wireOn=false;
document.getElementById('mode').onclick=e=>{const b=e.target.closest('button');if(b)setMode(b.dataset.m);};
document.getElementById('wire').onchange=e=>{wireOn=e.target.checked; if(model)model.traverse(o=>{if(o.isMesh&&o.material)o.material.wireframe=wireOn;});};
let spin=false;
document.getElementById('spin').onclick=e=>{const b=e.target.closest('button');if(!b)return;spin=b.dataset.s==='1';
  document.querySelectorAll('#spin button').forEach(x=>x.classList.toggle('on',x===b));};

function loop(){requestAnimationFrame(loop); if(spin&&model)model.rotation.y+=0.004; controls.update(); renderer.render(scene,camera);}
loop();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
</body>
</html>
