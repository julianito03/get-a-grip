<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Get a Grip — Prow Wall</title>
<style>
  :root{--bg:#0a0c0f;--panel:#15181d;--panel2:#1c2027;--line:#2a2f38;--ink:#f2f4f7;--muted:#8b93a1;--accent:#ffd21e;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:var(--font);overflow:hidden}
  #app{position:fixed;inset:0} canvas{display:block}
  #ui{position:absolute;top:0;left:0;height:100%;width:320px;
    background:linear-gradient(180deg,rgba(21,24,29,.94),rgba(10,12,15,.94));
    border-right:1px solid var(--line);display:flex;flex-direction:column;backdrop-filter:blur(8px);z-index:10}
  .brand{padding:20px 20px 14px;border-bottom:1px solid var(--line)}
  .brand h1{margin:0;font-size:19px;letter-spacing:.02em;font-weight:800;display:flex;align-items:center;gap:9px}
  .brand h1 .dot{width:11px;height:11px;border-radius:3px;background:var(--accent);box-shadow:0 0 12px var(--accent)}
  .brand p{margin:5px 0 0;font-size:12px;color:var(--muted)}
  .sect{padding:12px 18px 2px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .list{flex:1;overflow-y:auto;padding:2px 12px 20px}
  .list::-webkit-scrollbar{width:8px}.list::-webkit-scrollbar-thumb{background:#2a2f38;border-radius:4px}
  .route{display:flex;align-items:center;gap:12px;padding:11px 12px;margin:6px 0;border-radius:10px;
    background:var(--panel2);border:1px solid var(--line);cursor:pointer;transition:.15s}
  .route:hover{border-color:#3a414c;transform:translateX(2px)}
  .route.active{border-color:var(--accent);background:#20242c;box-shadow:0 0 0 1px var(--accent) inset}
  .route .swatch{width:16px;height:16px;border-radius:5px;flex:0 0 auto;box-shadow:0 0 0 2px rgba(255,255,255,.08)}
  .route .meta{flex:1;min-width:0}
  .route .meta .nm{font-size:14px;font-weight:600;line-height:1.2}
  .route .meta .sub{font-size:11.5px;color:var(--muted);margin-top:2px}
  .route .grade{font-size:12px;font-weight:800;padding:3px 8px;border-radius:6px;background:#0a0c0f;color:var(--accent)}
  .hint{padding:12px 20px;border-top:1px solid var(--line);font-size:11.5px;color:var(--muted);line-height:1.5}
  #topbar{position:absolute;top:14px;right:14px;display:flex;gap:8px;z-index:10}
  #topbar button{padding:9px 14px;font-size:12.5px;font-weight:600;color:var(--ink);
    background:rgba(28,32,39,.9);border:1px solid var(--line);border-radius:9px;cursor:pointer;transition:.15s;
    display:flex;align-items:center;gap:7px;backdrop-filter:blur(6px)}
  #topbar button:hover{border-color:#3a414c;background:rgba(38,43,52,.9)}
  #topbar button.on{border-color:var(--accent);color:var(--accent)}
  #topbar button svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.7}
  #detail{position:absolute;bottom:16px;right:16px;width:288px;padding:16px 18px;z-index:10;
    background:rgba(21,24,29,.96);border:1px solid var(--line);border-radius:14px;backdrop-filter:blur(8px);
    transform:translateY(150%);transition:transform .28s cubic-bezier(.2,.8,.2,1)}
  #detail.show{transform:translateY(0)}
  #detail .dh{display:flex;align-items:center;gap:10px}
  #detail .dh .swatch{width:18px;height:18px;border-radius:6px}
  #detail .dh .nm{font-size:16px;font-weight:700;flex:1}
  #detail .dh .grade{font-size:13px;font-weight:800;color:var(--accent)}
  #detail .drow{display:flex;gap:18px;margin-top:12px}
  #detail .drow div .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  #detail .drow div .v{font-size:15px;font-weight:600;margin-top:2px}
  #detail .setter{font-size:12px;color:var(--muted);margin-top:12px;line-height:1.5}
  #loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:var(--bg);z-index:50;color:var(--muted);font-size:14px}
  @media(max-width:720px){#ui{width:100%;height:auto;max-height:42%;bottom:0;top:auto;border-right:none;border-top:1px solid var(--line)}#detail{display:none}}
</style>
</head>
<body>
<div id="app"></div>
<div id="loading">Loading wall…</div>

<div id="ui">
  <div class="brand"><h1><span class="dot"></span>GET A GRIP</h1><p>Prow wall · routes by colour</p></div>
  <div class="sect">Routes</div>
  <div class="list" id="list"></div>
  <div class="hint">Each colour is a route. Drag to orbit · scroll to zoom · click a route or a hold to isolate it.</div>
</div>

<div id="topbar">
  <button id="btnReset"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v4h4"/></svg>Reset</button>
  <button id="btnAll"><svg viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>All holds</button>
</div>

<div id="detail">
  <div class="dh"><span class="swatch"></span><span class="nm"></span><span class="grade"></span></div>
  <div class="drow">
    <div><div class="k">Level</div><div class="v" data-level></div></div>
    <div><div class="k">Holds</div><div class="v" data-holds></div></div>
    <div><div class="k">Style</div><div class="v" data-style></div></div>
  </div>
  <div class="setter" data-desc></div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
const R=THREE, PI=Math.PI;

/* =========================================================================
   GET A GRIP — the REAL prow photo draped over a 3D prow mesh.
   Vertex displacement builds the prow (arête bulges toward viewer, wings
   fold back). Interactive colour-routes are overlaid as glowing rings that
   sit exactly on the photographed holds.  fx,fy = photo fractions (0..1).
   ========================================================================= */
const scene=new R.Scene(); scene.background=new R.Color(0x0a0c0f);
scene.fog=new R.Fog(0x0a0c0f,22,50);
const renderer=new R.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping=R.ACESFilmicToneMapping; renderer.toneMappingExposure=1.05;
document.getElementById('app').appendChild(renderer.domElement);

const camera=new R.PerspectiveCamera(46,innerWidth/innerHeight,0.1,200);
const HOME={pos:new R.Vector3(0,3.35,10.6),tgt:new R.Vector3(0,3.15,0.5)};
camera.position.copy(HOME.pos);
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=.08; controls.target.copy(HOME.tgt);
controls.minDistance=5; controls.maxDistance=18;
controls.maxPolarAngle=PI*0.56; controls.minPolarAngle=PI*0.2;
controls.minAzimuthAngle=-0.85; controls.maxAzimuthAngle=0.85;

scene.add(new R.AmbientLight(0xffffff,0.9));
const dl=new R.DirectionalLight(0xffffff,0.35); dl.position.set(-3,6,8); scene.add(dl);

/* ---------- prow geometry: displaced plane ----------
   W×H plane, bottom sitting at y=0. z = prow depth as a function of (u,v). */
const W=9.4, H=7.05;
function clamp(x,a,b){return Math.max(a,Math.min(b,x));}
function sstep(a,b,x){x=clamp((x-a)/(b-a),0,1);return x*x*(3-2*x);}
function zProw(fx,fy){                       // fx 0..1 (L→R), fy 0..1 (top→bottom)
  const ridge=Math.exp(-Math.pow((fx-0.50)/0.24,2));  // central arête bulge
  let z=1.35*ridge;
  z-=0.95*sstep(0.72,1.0,fx);                // right wing folds back (steep dark panel)
  z-=0.55*sstep(0.34,0.0,fx);                // left wing recedes
  z+=0.18*(1-fy);                            // apex is lower/closer, top recedes a touch
  return z;
}
const surf=(fx,fy)=>new R.Vector3((fx-0.5)*W,(1-fy)*H,zProw(fx,fy)); // world pos of a photo point

const geo=new R.PlaneGeometry(W,H,140,108);
const pos=geo.attributes.position;
for(let i=0;i<pos.count;i++){
  const fx=(pos.getX(i)+W/2)/W, fy=1-(pos.getY(i)+H/2)/H;
  pos.setZ(i, zProw(fx,fy));
}
geo.computeVertexNormals();
const tex=new R.TextureLoader().load('wall_prow.jpg',()=>document.getElementById('loading').style.display='none');
tex.colorSpace=R.SRGBColorSpace; tex.anisotropy=renderer.capabilities.getMaxAnisotropy();
const wallMat=new R.MeshBasicMaterial({map:tex,color:0xffffff});   // unlit → looks exactly like the photo
const wall=new R.Mesh(geo,wallMat); wall.position.y=H/2; scene.add(wall);

/* soft dark mat on the floor */
const mat=new R.Mesh(new R.CircleGeometry(9,48),new R.MeshBasicMaterial({color:0x14161a}));
mat.rotation.x=-PI/2; mat.position.set(0,0.01,3); scene.add(mat);

/* =========================================================================
   HOLDS — traced from the photo (fx,fy).  colour = route.
   ========================================================================= */
const COL={yellow:0xf2c40c,green:0x54c341,blue:0x4384c8,grey:0xb9b0a0,purple:0x8f5bb0};
// [fx, fy, colour, size]
const HOLDS=[
  // ---- YELLOW volumes (big quarter-pie splits + smalls) ----
  [.088,.080,'yellow',.55],[.385,.255,'yellow',.72],[.570,.200,'yellow',.5],
  [.720,.117,'yellow',.5],[.675,.567,'yellow',.72],[.385,.667,'yellow',.66],
  [.880,.940,'yellow',.55],[.825,.410,'yellow',.22],[.772,.600,'yellow',.2],[.792,.605,'yellow',.18],
  // ---- GREEN ----
  [.180,.100,'green',.28],[.145,.190,'green',.22],[.150,.223,'green',.2],
  [.093,.453,'green',.34],[.118,.493,'green',.22],
  [.068,.823,'green',.24],[.180,.827,'green',.24],[.215,.860,'green',.2],
  [.300,.673,'green',.26],[.308,.727,'green',.2],[.325,.767,'green',.2],
  // ---- BLUE ----
  [.215,.080,'blue',.22],[.230,.200,'blue',.24],[.238,.313,'blue',.22],
  [.250,.440,'blue',.22],[.258,.467,'blue',.2],
  [.395,.423,'blue',.24],[.405,.460,'blue',.22],
  [.540,.520,'blue',.22],[.625,.593,'blue',.24],[.618,.667,'blue',.22],
  [.645,.720,'blue',.22],[.660,.787,'blue',.22],[.880,.603,'blue',.22],[.895,.643,'blue',.2],
  // ---- GREY / neutral ----
  [.180,.200,'grey',.22],[.485,.240,'grey',.2],[.505,.313,'grey',.2],[.525,.267,'grey',.2],
  [.550,.287,'grey',.2],[.710,.073,'grey',.24],[.825,.327,'grey',.22],[.950,.427,'grey',.22],[.480,.360,'grey',.2],
  // ---- PURPLE ----
  [.030,.823,'purple',.24],
];

/* ring sprite texture (white ring + glow; tinted per hold) */
function ringTex(){
  const c=document.createElement('canvas');c.width=c.height=128;const x=c.getContext('2d');
  const cx=64,cy=64;
  const g=x.createRadialGradient(cx,cy,20,cx,cy,64); g.addColorStop(0,'rgba(255,255,255,0)');
  g.addColorStop(.62,'rgba(255,255,255,0)');g.addColorStop(.75,'rgba(255,255,255,.95)');
  g.addColorStop(.9,'rgba(255,255,255,.25)');g.addColorStop(1,'rgba(255,255,255,0)');
  x.fillStyle=g;x.fillRect(0,0,128,128);
  x.strokeStyle='rgba(255,255,255,1)';x.lineWidth=7;x.beginPath();x.arc(cx,cy,42,0,7);x.stroke();
  const t=new R.CanvasTexture(c);t.colorSpace=R.SRGBColorSpace;return t;
}
const RING=ringTex();
const holds=[]; // {fx,fy,color, colorName, sprite, pos}
HOLDS.forEach(([fx,fy,cn,s])=>{
  const p=surf(fx,fy); p.z+=0.08;
  const sp=new R.Sprite(new R.SpriteMaterial({map:RING,color:COL[cn],transparent:true,opacity:0,depthTest:false,depthWrite:false}));
  const sz=0.34+s*0.55; sp.scale.set(sz,sz,sz); sp.position.copy(p); sp.renderOrder=2; scene.add(sp);
  holds.push({fx,fy,colorName:cn,sprite:sp,pos:p});
});

/* =========================================================================
   ROUTES = colour groups.  Grade/level from the wall's number tags.
   ========================================================================= */
const META={
  yellow:{name:'Yellow Volumes',grade:'V4',level:2,style:'Overhang · volumes',desc:'The big split quarter-pie volumes fanning up the prow. Tags read 3–5. Compression and long spans between the yellow blocks.'},
  green :{name:'Green',         grade:'V3',level:2,style:'Face · slopers',   desc:'Green cluster up the left flank and the lower-centre. Tag reads 3.'},
  blue  :{name:'Blue',          grade:'V2',level:1,style:'Vertical · jugs',  desc:'Blue holds from the top-left down the centre and out the right diagonal. Tag reads 4.'},
  grey  :{name:'Grey / Wood',   grade:'V1',level:1,style:'Open · pinches',   desc:'The neutral grey and wooden holds through the middle — an easy line, open feet on everything.'},
  purple:{name:'Purple',        grade:'V0',level:1,style:'Intro · low',      desc:'Low purple hold on the far left. Intro moves.'},
};
const ORDER=['yellow','green','blue','grey','purple'];
const ROUTES=ORDER.filter(c=>holds.some(h=>h.colorName===c)).map(c=>({
  id:c,color:COL[c],count:holds.filter(h=>h.colorName===c).length,...META[c]}));
const byRoute=Object.fromEntries(ROUTES.map(r=>[r.id,r]));

/* =========================================================================
   VIEW STATE
   ========================================================================= */
let active=null, showAll=false;
function applyView(){
  const dim = active||showAll;
  targetWallColor = dim?0x555a60:0xffffff;
  holds.forEach(h=>{
    let op=0;
    if(active) op = (h.colorName===active)?1:0;
    else if(showAll) op=0.9;
    h.sprite.userData.targetOp=op;
  });
}
let targetWallColor=0xffffff;
function select(id){
  active=(active===id)?null:id; if(active) showAll=false; applyView();
  document.querySelectorAll('.route').forEach(el=>el.classList.toggle('active',el.dataset.id===active));
  document.getElementById('btnAll').classList.toggle('on',showAll);
  const d=document.getElementById('detail');
  if(active){const r=byRoute[active];d.classList.add('show');
    d.querySelector('.swatch').style.background='#'+r.color.toString(16).padStart(6,'0');
    d.querySelector('.nm').textContent=r.name; d.querySelector('.grade').textContent=r.grade;
    d.querySelector('[data-level]').textContent=['','Beginner','Intermediate','Advanced'][r.level];
    d.querySelector('[data-holds]').textContent=r.count;
    d.querySelector('[data-style]').textContent=r.style.split(' · ')[0];
    d.querySelector('[data-desc]').textContent=r.desc;
  } else d.classList.remove('show');
}

/* click a hold on the wall → select its route */
const ray=new R.Raycaster(),mouse=new R.Vector2(); let downXY=null;
renderer.domElement.addEventListener('pointerdown',e=>downXY=[e.clientX,e.clientY]);
renderer.domElement.addEventListener('pointerup',e=>{if(!downXY)return;
  if(Math.hypot(e.clientX-downXY[0],e.clientY-downXY[1])>6)return;
  mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;ray.setFromCamera(mouse,camera);
  const hit=ray.intersectObject(wall,false)[0]; if(!hit||!hit.uv)return;
  const fx=hit.uv.x, fy=1-hit.uv.y; let best=null,bd=0.05;
  holds.forEach(h=>{const d=Math.hypot(h.fx-fx,h.fy-fy);if(d<bd){bd=d;best=h;}});
  if(best)select(best.colorName);});

/* sidebar */
const listEl=document.getElementById('list');
ROUTES.forEach(r=>{const el=document.createElement('div');el.className='route';el.dataset.id=r.id;
  el.innerHTML=`<span class="swatch" style="background:#${r.color.toString(16).padStart(6,'0')}"></span>
    <div class="meta"><div class="nm">${r.name}</div>
    <div class="sub">${['','Beginner','Intermediate','Advanced'][r.level]} · ${r.count} holds</div></div>
    <span class="grade">${r.grade}</span>`;
  el.onclick=()=>select(r.id); listEl.appendChild(el);});
document.getElementById('btnReset').onclick=()=>{tweenCam(HOME.pos);tweenTarget(HOME.tgt);};
document.getElementById('btnAll').onclick=e=>{active=null;showAll=!showAll;applyView();
  document.querySelectorAll('.route').forEach(el=>el.classList.remove('active'));
  document.getElementById('detail').classList.remove('show');
  e.currentTarget.classList.toggle('on',showAll);};

/* tweens + loop */
let camTween=null,tgtTween=null;
function tweenCam(to){camTween={from:camera.position.clone(),to:to.clone(),t:0};}
function tweenTarget(to){tgtTween={from:controls.target.clone(),to:to.clone(),t:0};}
const ease=t=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
const _c1=new R.Color(),_c2=new R.Color();
let last=performance.now(), pulse=0;
function loop(now){const dt=Math.min((now-last)/1000,.05);last=now; pulse+=dt;
  if(camTween){camTween.t=Math.min(camTween.t+dt/.9,1);camera.position.lerpVectors(camTween.from,camTween.to,ease(camTween.t));if(camTween.t>=1)camTween=null;}
  if(tgtTween){tgtTween.t=Math.min(tgtTween.t+dt/.9,1);controls.target.lerpVectors(tgtTween.from,tgtTween.to,ease(tgtTween.t));if(tgtTween.t>=1)tgtTween=null;}
  // wall colour dim tween
  _c1.copy(wallMat.color); _c2.setHex(targetWallColor); wallMat.color.copy(_c1.lerp(_c2,0.12));
  // ring opacity + subtle pulse
  const pf=0.82+0.18*Math.sin(pulse*3.5);
  holds.forEach(h=>{const m=h.sprite.material;const t=h.sprite.userData.targetOp||0;
    m.opacity+=(t-m.opacity)*0.15; m.opacity=Math.max(0,m.opacity);
    const base=0.34+0.55*0.4; const on=(active&&h.colorName===active);
    h.sprite.material.rotation=0;});
  controls.update();renderer.render(scene,camera);requestAnimationFrame(loop);}
applyView();requestAnimationFrame(loop);
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
</body>
</html>
